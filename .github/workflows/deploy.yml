name: Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'README.md'
      - 'overrides/**'
      - 'docs/**'
      - 'mkdocs.yml'
      - 'uv.lock'
      - 'pyproject.toml'
      - '.python-version'
      - '.github/workflows/**'
  repository_dispatch:
    types: [build]

permissions:
  contents: write

env:
  FETCH_SUBMODULE: false
  UV_PYTHON: 3.12

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Show Python versions
        run: |
          python --version
          uv python list

      - name: Submodule fetching
        continue-on-error: true
        if: ${{ env.FETCH_SUBMODULE == 'true' }}
        run: |
          git submodule update --init --recursive --checkout -f --remote -- "docs"
          git config --global user.name "GitHub Action"
          git config --global user.email "noreply@github.com"
          git commit -am "chore(update): fetch submodule" || echo "No changes to commit"
          git push || echo "No changes to push"

      - name: Install dependencies
        run: uv sync --no-dev --python 3.12

      - name: Deploy
        run: uv run --python 3.12 mkdocs gh-deploy --force
